services:
  db:
    image: postgres:alpine
    container_name: bbddMedinaAsoc
    restart: unless-stopped
    env_file:
      - .env.db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  pgadmin:
    image: dpage/pgadmin4
    restart: unless-stopped
    env_file:
      - .env.db
    ports:
      - "8080:80"
    depends_on:
      - db
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
    name: postgres_data_users
  pgadmin_data:
    name: pgadmin_data_users